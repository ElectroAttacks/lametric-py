name: Bug report
description: Something is not working as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        Please search [existing issues](https://github.com/ElectroAttacks/lametric-py/issues) before submitting.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or sequence of steps that reliably reproduces the issue.
      placeholder: |
        ```python
        from lametric import LaMetricDevice
        ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include the full traceback if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: lametric-py version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.14.0"
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Device firmware version (if applicable)
      placeholder: "e.g. 2.3.9"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might be relevant.
    validations:
      required: false
