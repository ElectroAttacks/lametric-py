---

name: CI & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

# ─── Stage 1: pre-commit ─────────────────────────────────────────────────────
# JSON/YAML parsing+linting, Ruff, Mypy, Pytest.
# ─── Stage 2: release ────────────────────────────────────────────────────────
# Semantic release. Only runs on push to main after all validators pass.

jobs:
  # ── Stage 1 ─────────────────────────────────────────────────────────────────
  pre-commit:
    name: "Stage 1 · JSON+YAML / Ruff / Mypy / Pytest"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Validate JSON files
        run: |
          find . -name "*.json" \
            -not -path "./.venv/*" \
            -not -path "./node_modules/*" \
            | sort | while read -r f; do
              python -m json.tool "$f" > /dev/null && echo "✓ $f" || exit 1
            done

      - name: Lint YAML files
        run: uvx yamllint --config-file .yamllint.yml .github/

      - name: Lint & Format Check (Ruff)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Type Check (Mypy)
        run: uv run mypy .

      - name: Run Tests (Pytest)
        run: uv run pytest --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Stage 2 ─────────────────────────────────────────────────────────────────
  release:
    needs: pre-commit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit: false
          changelog: false
          build: false

      - name: Install uv
        if: steps.release.outputs.released == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.14
        if: steps.release.outputs.released == 'true'
        run: uv python install 3.14

      - name: Build distributions
        if: steps.release.outputs.released == 'true'
        run: uv build

      - name: Upload Release Assets
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Upload Distribution Artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  publish-pypi:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download Distribution Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
