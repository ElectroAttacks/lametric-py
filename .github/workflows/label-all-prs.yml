---

name: Label All PRs (Retroactive)

on:
  workflow_dispatch:
    inputs:
      state:
        description: "PR state to process"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - merged
          - open

jobs:
  label:
    name: Apply labels to existing PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Label PRs based on changed files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_STATE: ${{ inputs.state }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import subprocess
          import fnmatch

          LABEL_RULES = {
              "ci": [
                  ".github/workflows/**",
                  ".github/dependabot.yml",
                  ".pre-commit-config.yaml",
                  ".yamllint.yml",
                  "pyproject.toml",
              ],
              "dependencies": [
                  ".github/dependabot.yml",
                  "pyproject.toml",
              ],
              "documentation": [
                  "README.md",
                  "wiki/**",
                  "CONTRIBUTING.md",
                  "SECURITY.md",
                  "CODE_OF_CONDUCT.md",
                  ".github/ISSUE_TEMPLATE/**",
                  ".github/PULL_REQUEST_TEMPLATE.md",
              ],
              "new-feature": [
                  "custom_components/**",
              ],
              "bugfix": [
                  "custom_components/**",
              ],
          }


          def matches_any(path, patterns):
              return any(fnmatch.fnmatch(path, p) for p in patterns)


          def get_labels_for_files(files):
              labels = set()
              for label, patterns in LABEL_RULES.items():
                  if any(matches_any(f, patterns) for f in files):
                      # Don't apply both new-feature and bugfix automatically
                      if label not in ("new-feature", "bugfix"):
                          labels.add(label)
              return labels


          state = os.environ.get("PR_STATE", "all")
          result = subprocess.run(
              ["gh", "pr", "list", "--state", state, "--json", "number", "--limit", "500"],
              capture_output=True, text=True, check=True,
          )
          prs = json.loads(result.stdout)
          print(f"Found {len(prs)} PR(s) with state={state!r}")

          for pr in prs:
              number = pr["number"]
              files_result = subprocess.run(
                  ["gh", "pr", "view", str(number), "--json", "files"],
                  capture_output=True, text=True, check=True,
              )
              files = [f["path"] for f in json.loads(files_result.stdout)["files"]]
              labels = get_labels_for_files(files)

              if labels:
                  label_args = []
                  for label in sorted(labels):
                      label_args += ["--add-label", label]
                  subprocess.run(
                      ["gh", "pr", "edit", str(number)] + label_args,
                      capture_output=True, text=True,
                  )
                  print(f"PR #{number}: applied {sorted(labels)}")
              else:
                  print(f"PR #{number}: no matching labels")
          EOF
