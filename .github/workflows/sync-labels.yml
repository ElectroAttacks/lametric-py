---

name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

jobs:
  labels:
    name: Sync GitHub Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v6
        with:
          github-token: ${{ secrets.WRITE_TOKEN }}
          yaml-file: .github/labels.yml
          skip-delete: false
          dry-run: false
